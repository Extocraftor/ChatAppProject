name: harmony
description: "Harmony chat client built with Flutter."
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  http: ^1.1.0
  provider: ^6.0.5
  intl: ^0.19.0
  flutter_webrtc: ^0.14.2
  audioplayers: ^6.5.0
  url_launcher: ^6.3.1
  media_kit: ^1.1.11
  media_kit_libs_windows_audio: ^1.0.9
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  objective_c:
    path: third_party/objective_c_stub

flutter:
  uses-material-design: true
