name: chat_app_frontend
description: "A simple chat app frontend built with Flutter."
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  http: ^1.1.0
  provider: ^6.0.5
  intl: ^0.19.0
  flutter_webrtc: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  objective_c:
    path: third_party/objective_c_stub

flutter:
  uses-material-design: true
